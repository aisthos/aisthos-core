<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AisthOS">
    <title>AisthOS</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a1a;
            --card: #1a1a2e;
            --indigo: #7C6AF7;
            --text: #e0e0e0;
            --dim: #888;
            --green: #4CAF50;
            --red: #f44336;
        }
        body {
            font-family: -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Шапка */
        header {
            padding: 16px 20px;
            text-align: center;
            border-bottom: 1px solid #222;
        }
        header h1 { font-size: 20px; color: var(--indigo); }
        header .status { font-size: 12px; color: var(--dim); margin-top: 4px; }
        .status-dot {
            display: inline-block; width: 8px; height: 8px;
            border-radius: 50%; margin-right: 4px; vertical-align: middle;
        }
        .status-dot.connected { background: var(--green); }
        .status-dot.disconnected { background: var(--red); }

        /* Чат */
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .msg {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.5;
        }
        .msg.user {
            align-self: flex-end;
            background: var(--indigo);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .msg.bot {
            align-self: flex-start;
            background: var(--card);
            border-bottom-left-radius: 4px;
        }
        .msg.system {
            align-self: center;
            background: transparent;
            color: var(--dim);
            font-size: 13px;
            font-style: italic;
        }
        .msg .emotion {
            font-size: 11px;
            color: var(--dim);
            margin-top: 4px;
        }

        /* Ввод */
        .input-area {
            padding: 12px 16px;
            background: var(--card);
            border-top: 1px solid #333;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        #textInput {
            flex: 1;
            background: var(--bg);
            border: 1px solid #444;
            border-radius: 20px;
            padding: 10px 16px;
            color: var(--text);
            font-size: 15px;
            outline: none;
        }
        #textInput:focus { border-color: var(--indigo); }

        /* Кнопка микрофона */
        #micBtn {
            width: 48px; height: 48px;
            border-radius: 50%;
            border: none;
            background: var(--indigo);
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #micBtn.recording {
            background: var(--red);
            animation: pulse 1s infinite;
        }
        #micBtn:disabled { opacity: 0.5; }

        #sendBtn {
            width: 48px; height: 48px;
            border-radius: 50%;
            border: none;
            background: var(--indigo);
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Emotion display */
        #emotionBar {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 8px;
            font-size: 24px;
        }

        /* Аудио индикатор */
        #audioIndicator {
            text-align: center;
            padding: 4px;
            font-size: 12px;
            color: var(--dim);
        }
    </style>
</head>
<body>
    <header>
        <h1>AisthOS</h1>
        <div class="status">
            <span class="status-dot disconnected" id="statusDot"></span>
            <span id="statusText">Подключение...</span>
        </div>
    </header>

    <div id="emotionBar">😺</div>

    <div id="chat">
        <div class="msg system">AisthOS — grows with you</div>
    </div>

    <div id="audioIndicator"></div>

    <div class="input-area">
        <input type="text" id="textInput" placeholder="Написать..." />
        <button id="sendBtn" onclick="sendText()">➤</button>
        <button id="micBtn" onclick="toggleMic()">🎤</button>
    </div>

    <script>
    // ── Конфигурация ──────────────────────────────────────────
    const WS_URL = `ws://${location.hostname}:8765`;
    const SAMPLE_RATE = 16000;

    let ws = null;
    let isConnected = false;
    let isRecording = false;
    let mediaRecorder = null;
    let audioContext = null;
    let audioChunks = [];

    // ── WebSocket ──────────────────────────────────────────────
    function connect() {
        ws = new WebSocket(WS_URL);

        ws.onopen = () => {
            setStatus(true, 'Подключено');
            // Отправляем hello
            ws.send(JSON.stringify({ type: 'hello' }));
        };

        ws.onclose = () => {
            setStatus(false, 'Отключено. Переподключение...');
            setTimeout(connect, 3000);
        };

        ws.onerror = () => {
            setStatus(false, 'Ошибка подключения');
        };

        ws.onmessage = (event) => {
            if (event.data instanceof Blob) {
                // Бинарные данные = аудио от TTS
                playAudioChunk(event.data);
                return;
            }
            const msg = JSON.parse(event.data);
            handleMessage(msg);
        };
    }

    function handleMessage(msg) {
        switch (msg.type) {
            case 'hello':
                addMessage('system', `Сессия: ${msg.session_id?.slice(0, 8) || 'ok'}`);
                break;
            case 'display':
                updateEmotion(msg.frame);
                break;
            case 'emotion':
                showEmotion(msg);
                break;
            case 'stt':
                if (msg.text) addMessage('user', msg.text);
                break;
            case 'llm':
                addMessage('bot', msg.text, msg);
                break;
            case 'tts_start':
                document.getElementById('audioIndicator').textContent = '🔊 Говорю...';
                break;
            case 'tts_end':
                document.getElementById('audioIndicator').textContent = '';
                break;
            case 'backend_info':
                document.getElementById('audioIndicator').textContent = `🤖 ${msg.backend}`;
                setTimeout(() => {
                    document.getElementById('audioIndicator').textContent = '';
                }, 2000);
                break;
            case 'error':
                addMessage('system', `⚠️ ${msg.message}`);
                break;
        }
    }

    // ── UI ─────────────────────────────────────────────────────
    function setStatus(connected, text) {
        isConnected = connected;
        document.getElementById('statusDot').className =
            `status-dot ${connected ? 'connected' : 'disconnected'}`;
        document.getElementById('statusText').textContent = text;
    }

    function addMessage(type, text, extra) {
        const chat = document.getElementById('chat');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.textContent = text;

        if (extra && extra.primary) {
            const emo = document.createElement('div');
            emo.className = 'emotion';
            emo.textContent = `${extra.primary} (${Math.round((extra.intensity || 0.5) * 100)}%)`;
            div.appendChild(emo);
        }

        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    const EMOTION_EMOJI = {
        neutral: '😺', happy: '😸', sad: '😿', angry: '😾',
        surprised: '🙀', love: '😻', thinking: '🤔', listening: '👂',
        sleeping: '😴', excited: '⚡', curious: '🧐', annoyed: '😤',
        greeting: '👋', boot: '🚀', nyan: '🌈'
    };

    function updateEmotion(frame) {
        document.getElementById('emotionBar').textContent =
            EMOTION_EMOJI[frame] || '😺';
    }

    function showEmotion(msg) {
        if (msg.primary) {
            document.getElementById('emotionBar').textContent =
                EMOTION_EMOJI[msg.primary] || '😺';
        }
    }

    // ── Текстовый ввод ────────────────────────────────────────
    function sendText() {
        const input = document.getElementById('textInput');
        const text = input.value.trim();
        if (!text || !isConnected) return;

        addMessage('user', text);
        ws.send(JSON.stringify({ type: 'text', content: text }));
        input.value = '';
    }

    document.getElementById('textInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') sendText();
    });

    // ── Микрофон ──────────────────────────────────────────────
    async function toggleMic() {
        if (isRecording) {
            stopRecording();
        } else {
            await startRecording();
        }
    }

    async function startRecording() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                audio: { sampleRate: SAMPLE_RATE, channelCount: 1 }
            });

            audioContext = new AudioContext({ sampleRate: SAMPLE_RATE });
            const source = audioContext.createMediaStreamSource(stream);
            const processor = audioContext.createScriptProcessor(4096, 1, 1);

            // Отправляем audio_start
            ws.send(JSON.stringify({ type: 'audio_start' }));

            processor.onaudioprocess = (e) => {
                if (!isRecording) return;
                const float32 = e.inputBuffer.getChannelData(0);
                // Конвертируем Float32 → Int16
                const int16 = new Int16Array(float32.length);
                for (let i = 0; i < float32.length; i++) {
                    int16[i] = Math.max(-32768, Math.min(32767, float32[i] * 32768));
                }
                ws.send(int16.buffer);
            };

            source.connect(processor);
            processor.connect(audioContext.destination);

            isRecording = true;
            document.getElementById('micBtn').classList.add('recording');
            document.getElementById('micBtn').textContent = '⏹';
            document.getElementById('audioIndicator').textContent = '🎤 Слушаю...';

            // Сохраняем для остановки
            window._micStream = stream;
            window._micProcessor = processor;
            window._micSource = source;
        } catch (err) {
            addMessage('system', '⚠️ Нет доступа к микрофону');
        }
    }

    function stopRecording() {
        isRecording = false;
        document.getElementById('micBtn').classList.remove('recording');
        document.getElementById('micBtn').textContent = '🎤';
        document.getElementById('audioIndicator').textContent = '⏳ Обработка...';

        // Отправляем audio_end
        ws.send(JSON.stringify({ type: 'audio_end' }));

        // Останавливаем потоки
        if (window._micStream) {
            window._micStream.getTracks().forEach(t => t.stop());
        }
        if (window._micProcessor) {
            window._micProcessor.disconnect();
        }
        if (window._micSource) {
            window._micSource.disconnect();
        }
        if (audioContext) {
            audioContext.close();
        }
    }

    // ── Воспроизведение TTS ───────────────────────────────────
    let audioQueue = [];
    let isPlaying = false;

    function playAudioChunk(blob) {
        audioQueue.push(blob);
        if (!isPlaying) playNext();
    }

    async function playNext() {
        if (audioQueue.length === 0) {
            isPlaying = false;
            return;
        }
        isPlaying = true;
        const blob = audioQueue.shift();
        const url = URL.createObjectURL(blob);
        const audio = new Audio(url);
        audio.onended = () => {
            URL.revokeObjectURL(url);
            playNext();
        };
        audio.onerror = () => playNext();
        try { await audio.play(); } catch(e) { playNext(); }
    }

    // ── Старт ─────────────────────────────────────────────────
    connect();
    </script>
</body>
</html>
